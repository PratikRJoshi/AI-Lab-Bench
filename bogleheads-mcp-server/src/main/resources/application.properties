# Server configuration
server.port=8080
spring.application.name=bogleheads-mcp-server

# Data directories
app.data.raw-dir=data/raw
app.data.index-dir=data/index

# Scraper settings (disabled by default for fast startup)
app.scraper.enabled=false
app.scraper.pages-per-forum=1
app.scraper.pause-ms=2000
