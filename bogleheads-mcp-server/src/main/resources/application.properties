# Server configuration
server.port=8080
spring.application.name=bogleheads-mcp-server

# Data directories
app.data.raw-dir=data/raw
app.data.index-dir=data/index

# Scraper settings (disabled by default for fast startup)
app.scraper.enabled=false
app.scraper.pages-per-forum=1
app.scraper.pause-ms=2000

# CloudFlare bypass cookie (get from browser after solving challenge)
# 1. Open https://www.bogleheads.org/forum/index.php in Chrome
# 2. Wait for "Just a moment..." challenge to solve (1-2 seconds)
# 3. DevTools -> Application -> Cookies -> copy cf_clearance value
# 4. Paste here and set app.scraper.enabled=true
app.scraper.cf-clearance-cookie=
